<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: #0E0E0E; padding: 24px; font-family: var(--font-sans); color: var(--fg-0); display: flex; gap: 32px; }
  .sidebar { width: 60px; height: 280px; background: rgba(255,255,255,0.046); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
  .group { display: flex; flex-direction: column; gap: 8px; }
  .tab { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.55); }
  .tab.active { background: rgba(255,255,255,0.10); color: #fff; }
  .tab svg { width: 22px; height: 22px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: url('../assets/avatar-sample.jpg') center/cover; box-shadow: 0 0 0 2px #E8B84A; }
  .cog { color: rgba(255,255,255,0.6); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
  .cog svg { width: 22px; height: 22px; }
  .annot { display: flex; flex-direction: column; gap: 18px; padding-top: 8px; }
  .row { display: flex; align-items: center; gap: 12px; font-size: 12px; color: rgba(255,255,255,0.85); }
  .key { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 96px; }
</style>
</head>

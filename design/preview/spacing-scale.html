<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: #0E0E0E; padding: 24px; font-family: var(--font-sans); color: var(--fg-0); }
  .row { display: flex; align-items: center; gap: 16px; padding: 6px 0; }
  .label { width: 60px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .bar { background: rgba(255,255,255,0.22); height: 8px; border-radius: 2px; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
</style>
</head>
<body>
  <div class="row"><div class="label">space-1</div><div class="bar" style="width:4px"></div><div class="val">4 · gap inside subitems</div></div>
  <div class="row"><div class="label">space-2</div><div class="bar" style="width:6px"></div><div class="val">6 · panel item gap</div></div>
  <div class="row"><div class="label">space-3</div><div class="bar" style="width:8px"></div><div class="val">8 · checkbox row</div></div>
  <div class="row"><div class="label">space-4</div><div class="bar" style="width:10px"></div><div class="val">10 · item group gap</div></div>
  <div class="row"><div class="label">space-5</div><div class="bar" style="width:12px"></div><div class="val">12 · panel padding</div></div>
  <div class="row"><div class="label">space-6</div><div class="bar" style="width:16px"></div><div class="val">16 · body padding</div></div>
  <div class="row"><div class="label">space-7</div><div class="bar" style="width:20px"></div><div class="val">20 · composer header→body</div></div>
  <div class="row"><div class="label">space-8</div><div class="bar" style="width:24px"></div><div class="val">24</div></div>
  <div class="row"><div class="label">space-9</div><div class="bar" style="width:32px"></div><div class="val">32</div></div>
</body>
</html>

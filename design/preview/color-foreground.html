<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: #0E0E0E; padding: 20px; font-family: var(--font-sans); color: var(--fg-0); }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: center; gap: 14px; font-size: 13px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08); flex: 0 0 auto; }
  .label { width: 110px; font-weight: 500; font-size: 12px; }
  .value { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 220px; }
  .sample { font-size: 14px; }
</style>
</head>
<body>
<div class="stack">
  <div class="row"><div class="dot" style="background:#FFFFFF"></div><div class="label">fg-0</div><div class="value">rgb(255,255,255)</div><div class="sample" style="color:#FFFFFF">Primary — Concept Store</div></div>
  <div class="row"><div class="dot" style="background:rgba(255,255,255,0.85)"></div><div class="label">fg-1</div><div class="value">white α 0.85</div><div class="sample" style="color:rgba(255,255,255,0.85)">Secondary — body copy</div></div>
  <div class="row"><div class="dot" style="background:rgba(255,255,255,0.60)"></div><div class="label">fg-2</div><div class="value">white α 0.60</div><div class="sample" style="color:rgba(255,255,255,0.60)">Tertiary — inactive icon</div></div>
  <div class="row"><div class="dot" style="background:rgba(255,255,255,0.50)"></div><div class="label">fg-3</div><div class="value">white α 0.50</div><div class="sample" style="color:rgba(255,255,255,0.50)">Placeholder — Search...</div></div>
  <div class="row"><div class="dot" style="background:rgba(255,255,255,0.35)"></div><div class="label">fg-mute</div><div class="value">white α 0.35</div><div class="sample" style="color:rgba(255,255,255,0.35)">Disabled</div></div>
  <div class="row"><div class="dot" style="background:#B3B3B3"></div><div class="label">icon-base</div><div class="value">#B3B3B3</div><div class="sample" style="color:#B3B3B3">Button glyph</div></div>
  <div class="row"><div class="dot" style="background:#A8A8A8"></div><div class="label">icon-mute</div><div class="value">#A8A8A8</div><div class="sample" style="color:#A8A8A8">Leading icon</div></div>
</div>
</body>
</html>

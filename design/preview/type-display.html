<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: #0E0E0E; padding: 24px; font-family: var(--font-sans); color: var(--fg-0); }
  .row { display: flex; align-items: baseline; justify-content: space-between; gap: 24px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); flex: 0 0 auto; }
</style>
</head>
<body>
  <div class="row">
    <div style="font-size: 32px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2">What do you want to learn today?</div>
    <div class="meta">32 · 600 · −0.02em</div>
  </div>
  <div class="row">
    <div style="font-size: 24px; font-weight: 400; line-height: 1.2; letter-spacing: -0.01em">What do you want to learn today?</div>
    <div class="meta">24 · 400 · −0.01em</div>
  </div>
  <div class="row">
    <div style="font-size: 20px; font-weight: 600; line-height: 1.2; letter-spacing: -0.015em">Build Concept</div>
    <div class="meta">20 · 600 · dialog title</div>
  </div>
</body>
</html>

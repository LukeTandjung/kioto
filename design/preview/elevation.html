<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: #0E0E0E; padding: 24px; font-family: var(--font-sans); color: var(--fg-0); }
  .row { display: flex; gap: 14px; align-items: center; }
  .card { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .surf { height: 64px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; }
  .label { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
  .panel { background: rgba(255,255,255,0.046); border-radius: 12px; }
  .input { background: rgba(255,255,255,0.05); border-radius: 8px; color: rgba(255,255,255,0.5); }
  .btn { background: #404040; border-radius: 6px; box-shadow: inset 0px 2px 4px 0px rgba(255,255,255,0.10); }
  .btn-press { background: #404040; border-radius: 6px; box-shadow: inset 0px 2px 4px 0px rgba(0,0,0,0.30); }
  .popover { background: rgba(38,38,38,0.96); border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 24px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.30); }
</style>
</head>
<body>
<div class="row">
  <div class="card"><div class="surf panel">Panel surface</div><div class="label">white-046, no shadow</div></div>
  <div class="card"><div class="surf input">Input surface</div><div class="label">white-05, no shadow</div></div>
  <div class="card"><div class="surf btn">Button — rest</div><div class="label">inset 0 2 4 rgba(255,255,255,.10)</div></div>
  <div class="card"><div class="surf btn-press">Button — pressed</div><div class="label">inset 0 2 4 rgba(0,0,0,.30)</div></div>
  <div class="card"><div class="surf popover">Popover</div><div class="label">outer shadow only when floating</div></div>
</div>
</body>
</html>

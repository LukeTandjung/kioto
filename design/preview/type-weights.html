<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: #0E0E0E; padding: 24px; font-family: var(--font-sans); color: var(--fg-0); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 32px; }
  .row { display: flex; justify-content: space-between; align-items: baseline; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .sample { font-size: 18px; }
</style>
</head>
<body>
<div class="grid">
  <div class="row"><div class="sample" style="font-weight: 400">PP Mori Regular — limits, norms, completeness</div><div class="meta">400 · Regular</div></div>
  <div class="row"><div class="sample" style="font-weight: 600">PP Mori Semibold — Metric Spaces</div><div class="meta">500–600 · Semibold</div></div>
  <div class="row"><div class="sample" style="font-weight: 600">PP Mori Semibold — Build Concept</div><div class="meta">600 · dialog title</div></div>
  <div class="row"><div class="sample" style="font-weight: 800">PP Mori Black — Concept Store</div><div class="meta">700–900 · Black</div></div>
</div>
</body>
</html>

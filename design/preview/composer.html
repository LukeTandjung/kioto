<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: #0E0E0E; padding: 32px; font-family: var(--font-sans); color: #fff; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .prompt { font-size: 24px; font-weight: 400; line-height: 1.2; letter-spacing: -0.01em; }
  .composer { width: 514px; background: rgba(255,255,255,0.096); border-radius: 8px; padding: 12px 12px 12px 12px; display: flex; flex-direction: column; gap: 12px; }
  .body { font-size: 14px; line-height: 20px; font-weight: 500; color: #fff; }
  .footer { display: flex; justify-content: space-between; align-items: center; }
  .left { display: flex; gap: 24px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.5); }
  .chip svg { width: 12px; height: 12px; color: #B3B3B3; }
  .send { width: 16px; height: 16px; color: #fff; }
  .send svg { width: 16px; height: 16px; }
</style>
</head>
<body>
  <div class="prompt">What do you want to learn today?</div>
  <div class="composer">
    <div class="body">I want to learn more about limits, including the different types of limits in the respective metric, norm, and inner product space. Break it down into the following sections:</div>
    <div class="footer">
      <div class="left">
        <div class="chip">Select Fragments <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg></div>
        <div class="chip">Select Concepts <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg></div>
      </div>
      <div class="send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"/></svg></div>
    </div>
  </div>
</body>
</html>

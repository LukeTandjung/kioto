<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: #181818; padding: 16px; font-family: var(--font-sans); color: var(--fg-0); }
  .row { display: flex; gap: 12px; }
  .swatch { flex: 1; height: 138px; border-radius: 10px; padding: 14px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--white-05); }
  .name { font-size: 11px; font-weight: 500; color: var(--fg-0); letter-spacing: 0.02em; text-transform: uppercase; }
  .value { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .role { font-size: 11px; color: var(--fg-2); }
</style>
</head>
<body class="concise">
  <div class="row">
    <div class="swatch" style="background:#000000">
      <div><div class="name">Carbon 0</div><div class="role">Pure black · rare</div></div>
      <div class="value">#000000</div>
    </div>
    <div class="swatch" style="background:#0E0E0E">
      <div><div class="name">Carbon 1 — app bg</div><div class="role">rgb(14,14,14) · the only canvas</div></div>
      <div class="value">#0E0E0E</div>
    </div>
    <div class="swatch" style="background:#1A1A1A">
      <div><div class="name">Carbon 2</div><div class="role">Lifted surfaces</div></div>
      <div class="value">#1A1A1A</div>
    </div>
    <div class="swatch" style="background:#262626">
      <div><div class="name">Carbon 3</div><div class="role">Hover</div></div>
      <div class="value">#262626</div>
    </div>
    <div class="swatch" style="background:#404040">
      <div><div class="name">Carbon 4 — button</div><div class="role">Solid CTA fill</div></div>
      <div class="value">#404040</div>
    </div>
  </div>
</body>
</html>

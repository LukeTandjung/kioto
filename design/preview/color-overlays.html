<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: #0E0E0E; padding: 18px; font-family: var(--font-sans); color: var(--fg-0); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .cell { border-radius: 10px; padding: 12px; box-sizing: border-box; height: 160px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--white-05); }
  .name { font-size: 11px; font-weight: 500; letter-spacing: 0.02em; }
  .value { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .role { font-size: 11px; color: var(--fg-3); line-height: 1.4; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell" style="background: rgba(255,255,255,0.046)">
      <div class="name">white-046</div>
      <div><div class="role">sidebar · panel</div><div class="value">0.046α</div></div>
    </div>
    <div class="cell" style="background: rgba(255,255,255,0.05)">
      <div class="name">white-05</div>
      <div><div class="role">inputs · hairline</div><div class="value">0.05α</div></div>
    </div>
    <div class="cell" style="background: rgba(255,255,255,0.096)">
      <div class="name">white-096</div>
      <div><div class="role">composer fill</div><div class="value">0.096α</div></div>
    </div>
    <div class="cell" style="background: rgba(255,255,255,0.10)">
      <div class="name">white-10</div>
      <div><div class="role">button inset · ctrl fill</div><div class="value">0.10α</div></div>
    </div>
    <div class="cell" style="background: rgba(255,255,255,0.15)">
      <div class="name">white-15</div>
      <div><div class="role">checkbox border</div><div class="value">0.15α</div></div>
    </div>
    <div class="cell" style="background: rgba(255,255,255,0.30)">
      <div class="name">white-30</div>
      <div><div class="role">separators</div><div class="value">0.30α</div></div>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: #0E0E0E; padding: 24px; font-family: var(--font-sans); color: var(--fg-0); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .swatch { background: rgba(255,255,255,0.096); border: 1px solid rgba(255,255,255,0.05); width: 84px; height: 84px; }
  .name { font-size: 11px; font-weight: 500; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .role { font-size: 11px; color: var(--fg-3); }
</style>
</head>
<body>
<div class="row">
  <div class="item">
    <div class="swatch" style="border-radius: 4px"></div>
    <div class="name">radius-1</div><div class="val">4px</div><div class="role">checkbox</div>
  </div>
  <div class="item">
    <div class="swatch" style="border-radius: 6px"></div>
    <div class="name">radius-2</div><div class="val">6px</div><div class="role">buttons · chips</div>
  </div>
  <div class="item">
    <div class="swatch" style="border-radius: 8px"></div>
    <div class="name">radius-3</div><div class="val">8px</div><div class="role">search · composer</div>
  </div>
  <div class="item">
    <div class="swatch" style="border-radius: 12px"></div>
    <div class="name">radius-4</div><div class="val">12px</div><div class="role">panels</div>
  </div>
  <div class="item">
    <div class="swatch" style="border-radius: 50%; background: url('../assets/avatar-sample.jpg') center/cover"></div>
    <div class="name">radius-full</div><div class="val">9999px</div><div class="role">avatar only</div>
  </div>
</div>
</body>
</html>

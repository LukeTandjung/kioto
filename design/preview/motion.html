<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: #0E0E0E; padding: 24px; font-family: var(--font-sans); color: #fff; }
  .row { display: flex; gap: 14px; align-items: stretch; }
  .card { flex: 1; background: rgba(255,255,255,0.046); border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .name { font-size: 12px; font-weight: 600; }
  .val { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.5); }
  .role { font-size: 11px; color: rgba(255,255,255,0.6); line-height: 1.4; }
  .demo { height: 32px; display: flex; align-items: center; }
  .ball { width: 12px; height: 12px; background: #fff; border-radius: 50%; }
  .ball.h { animation: hov 1.4s var(--ease-out, cubic-bezier(0.16,1,0.3,1)) infinite; }
  .ball.p { animation: pop 1.6s var(--ease-out, cubic-bezier(0.16,1,0.3,1)) infinite; }
  .ball.d { animation: dia 1.8s var(--ease-out, cubic-bezier(0.16,1,0.3,1)) infinite; }
  @keyframes hov { 0%,40% { opacity:.4 } 50% { opacity: 1; transform: translateY(0) } 100% { opacity:.4 } }
  @keyframes pop { 0%,30% { opacity:0; transform: translateY(4px) } 45% { opacity:1; transform: translateY(0) } 90% { opacity:1; transform: translateY(0) } 100% { opacity:0 } }
  @keyframes dia { 0%,15% { opacity:0; transform: translateY(8px) } 35% { opacity:1; transform: translateY(0) } 85% { opacity:1 } 100% { opacity:0 } }
</style>
</head>
<body>
<div class="row">
  <div class="card">
    <div class="name">dur-1 · 90ms</div>
    <div class="val">ease-out</div>
    <div class="demo"><div class="ball h"></div></div>
    <div class="role">Hover · alpha bump</div>
  </div>
  <div class="card">
    <div class="name">dur-2 · 160ms</div>
    <div class="val">cubic-bezier(.16,1,.3,1)</div>
    <div class="demo"><div class="ball p"></div></div>
    <div class="role">Popover · fade + 4px in</div>
  </div>
  <div class="card">
    <div class="name">dur-3 · 240ms</div>
    <div class="val">cubic-bezier(.16,1,.3,1)</div>
    <div class="demo"><div class="ball d"></div></div>
    <div class="role">Dialog · fade + 8px in</div>
  </div>
  <div class="card">
    <div class="name">no bounce</div>
    <div class="val">—</div>
    <div class="demo" style="font-size:11px; color:rgba(255,255,255,0.5)">Nothing overshoots.</div>
    <div class="role">Press = inset shadow flip, no scale.</div>
  </div>
</div>
</body>
</html>

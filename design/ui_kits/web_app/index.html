<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Concise — Web App</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="app.css">
  <style>
    /* avoid system scrollbar on the root iframe */
    html, body { background: var(--bg-app); }
  </style>
</head>
<body class="concise">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Primitives first -->
  <script type="text/babel" src="Icon.jsx"></script>
  <script type="text/babel" src="controls.jsx"></script>

  <!-- Composite shells -->
  <script type="text/babel" src="Wordmark.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="Panel.jsx"></script>
  <script type="text/babel" src="MultiSelect.jsx"></script>
  <script type="text/babel" src="Dialog.jsx"></script>

  <!-- Panel contents (depend on Panel, *Row primitives) -->
  <script type="text/babel" src="ConceptsPanel.jsx"></script>
  <script type="text/babel" src="FragmentsPanel.jsx"></script>
  <script type="text/babel" src="NotesPanel.jsx"></script>

  <!-- Dialogs + composer -->
  <script type="text/babel" src="EmptyComposer.jsx"></script>
  <script type="text/babel" src="BuildConceptDialog.jsx"></script>
  <script type="text/babel" src="AddFragmentsDialog.jsx"></script>

  <!-- App + mount -->
  <script type="text/babel" src="App.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
